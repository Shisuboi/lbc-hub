<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LBC DealFinder Hub</title>

    <!-- SPA route restoration : si on arrive depuis 404.html avec ?/foo/bar,
         on remplace l'URL par /foo/bar avant que le router ne s'initialise. -->
    <script>
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&');
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash);
            }
        }(window.location));
    </script>

    <!-- Base href dynamique : assure que style.css / js/main.js se chargent correctement
         même quand on rafraîchit sur une route SPA (/hub, /search/:id, etc.).
         Prod GitHub Pages : base = /lbc-hub/  |  Dev server.py : base = / -->
    <script>
        (function () {
            var p = window.location.pathname;
            var basePath = p.indexOf('/lbc-hub') === 0 ? '/lbc-hub/' : '/';
            document.write('<base href="' + basePath + '">');
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="app-container">
        <header class="app-header" id="appHeader">
            <!-- Injecté par js/components/header.js -->
        </header>

        <main id="appRoot" class="app-body">
            <!-- Page courante injectée par le router -->
            <div class="page-loading">⏳ Chargement…</div>
        </main>
    </div>

    <!-- Supabase SDK self-hébergé : évite que Edge / Firefox bloquent l'accès au
         localStorage (Tracking Prevention sur un script cross-origin). -->
    <script src="js/vendor/supabase.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
