<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LBC DealFinder Hub</title>
    <meta name="description" content="Hub privé de bons plans : les recherches Leboncoin scrapées et notées par IA, partagées entre amis.">
    <meta name="theme-color" content="#060913">
    <meta property="og:type" content="website">
    <meta property="og:title" content="LBC DealFinder Hub">
    <meta property="og:description" content="Hub privé de bons plans : les recherches Leboncoin scrapées et notées par IA, partagées entre amis.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E🤖%3C/text%3E%3C/svg%3E">

    <!-- SPA route restoration : si on arrive depuis 404.html avec ?/foo/bar,
         on remplace l'URL par /foo/bar avant que le router ne s'initialise. -->
    <script>
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&');
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash);
            }
        }(window.location));
    </script>

    <!-- Base href STATIQUE : assure que style.css / js/main.js se chargent correctement
         même quand on rafraîchit sur une route SPA profonde (/item/:id, /search/:id…).
         Doit être statique (pas document.write) sinon le préchargeur HTML de Firefox
         résout les assets relatifs à l'URL du document AVANT que la base injectée par
         script n'existe → 'MIME text/html' sur style.css / main.js au refresh.
         Prod GitHub Pages : /lbc-hub/  |  Dev server.py : réécrit en / par index_handler. -->
    <base href="/lbc-hub/">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="app-container">
        <header class="app-header" id="appHeader">
            <!-- Injecté par js/components/header.js -->
        </header>

        <main id="appRoot" class="app-body">
            <!-- Page courante injectée par le router -->
            <div class="page-loading">⏳ Chargement…</div>
        </main>
    </div>

    <!-- Supabase SDK self-hébergé : évite que Edge / Firefox bloquent l'accès au
         localStorage (Tracking Prevention sur un script cross-origin). -->
    <script src="js/vendor/supabase.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
